version: "2.4"

services:
  mysql:
    image: mysql:8.0
    container_name: shortener-mysql
    environment:
      MYSQL_ROOT_PASSWORD: shortener
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./net/http/shortener/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pshortener"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: shortener-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shortener-app
    ports:
      - "8889:8889"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASS: shortener
      MYSQL_DB: shortener
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      BASE_URL: http://localhost:8889/
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql-data:
